<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 21 — Audio Explainer (With Applied Examples)</title>
<style>
:root{
  --bg:#F4F6FA; --surface:#FFFFFF; --surface2:#EEF1F8; --border:#DDE2EE; --border2:#C8CEDD;
  --accent:#2056C8; --accent-t:rgba(32,86,200,.08); --text:#1A1F35; --text2:#5B6585; --text3:#9AA0B8;
  --green:#1D9B6A; --radius:9px; --shadow:0 1px 3px rgba(26,31,53,.07), 0 4px 12px rgba(26,31,53,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding:20px;}
.wrap{max-width:760px;margin:0 auto;}
h1{font-size:18px;font-weight:700;margin-bottom:4px;}
.sub{font-size:12px;color:var(--text3);margin-bottom:20px;}

#player{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px;position:sticky;top:16px;z-index:10;}
#now-playing{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
#now-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;min-height:20px;}

.controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.ctrl-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:opacity .12s;}
.ctrl-btn:hover{opacity:.88;}
.ctrl-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.ctrl-btn:disabled{opacity:.35;cursor:default;}
.rate-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-left:auto;}
.rate-wrap select{border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);}

#jumprow{display:flex;flex-wrap:wrap;gap:6px;}
.jbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s;}
.jbtn:hover{background:var(--surface2);}
.jbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.jbtn.done{border-color:var(--green);color:var(--green);}

#progress-line{font-size:11px;color:var(--text3);margin-top:10px;}

#script{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.seg{padding:18px 22px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.seg:last-child{border-bottom:none;}
.seg:hover{background:var(--surface2);}
.seg.active{background:var(--accent-t);border-left:3px solid var(--accent);padding-left:19px;}
.seg-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--text2);margin-right:8px;}
.seg.active .seg-num{background:var(--accent);border-color:var(--accent);color:#fff;}
.seg-title{display:inline;font-size:13.5px;font-weight:600;color:var(--text);}
.seg-text{margin-top:8px;font-size:13.5px;color:var(--text2);line-height:1.65;}
.ex-text{margin-top:8px;font-size:13.5px;color:var(--text);font-weight:600;background:var(--surface2);padding:10px;border-radius:6px;}

.hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;}
</style>
</head>
<body>

<div class="wrap">
  <h1>Chapter 21 — Audio Explainer</h1>
  <div class="sub">Plain-language narration with strict engineering examples. Tap a number to jump straight to it.</div>

  <div id="player">
    <div id="now-playing">Up next</div>
    <div id="now-title">Diagram 1 — The Implied Contractual Duties</div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-play">▶ Play</button>
      <button class="ctrl-btn secondary" id="btn-pause" disabled>⏸ Pause</button>
      <button class="ctrl-btn secondary" id="btn-stop" disabled>⏹ Stop</button>
      <div class="rate-wrap">
        <span>Speed</span>
        <select id="rate-select">
          <option value="0.8">0.8×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
        </select>
      </div>
    </div>

    <div id="jumprow"></div>
    <div id="progress-line">Diagram 1 of 5</div>
  </div>

  <div id="script"></div>

  <div class="hint">Uses your browser's built-in voice — no audio files, no internet required after the page loads.</div>
</div>

<script>
const SEGMENTS = [
  {
    title: "Diagram 1 — The Implied Contractual Duties",
    text: "You don't need a fifty-page contract to be bound by employment law. The common law automatically forces three hidden rules onto your relationship. First, Fidelity: you must be loyal. You cannot steal trade secrets to compete against your boss, but you are always free to take your general brainpower to a new job. Second, Competence: if you make a negligent mistake, the law uses vicarious liability to sue your boss, not you. Third, Notice: your boss cannot just fire you out of nowhere; they must give you warning or pay you severance.",
    ex: "You quit your job at an aerospace firm. You are legally allowed to use your general engineering skills at a rival firm. But if you walk out with a USB drive containing your old boss's secret thruster blueprints and use them at the rival firm, you have breached the duty of fidelity and will be aggressively sued."
  },
  {
    title: "Diagram 2 — The Restrictive Covenant Gauntlet",
    text: "Bosses love making you sign 'non-compete' clauses so you cannot work for rivals. Courts absolutely hate these clauses because they stop people from making a living. To survive court, a non-compete must pass a brutal gauntlet. It must be perfectly clear, the time limit must be short, and the geographic map must be small. If a boss writes 'you can never work in this province again,' the judge will instantly throw the entire clause in the garbage, leaving you completely free to compete.",
    ex: "You sign a non-compete saying you won't do structural engineering for 10 years anywhere in Canada. You quit and immediately open a rival firm next door. Your old boss sues you. The judge laughs, declares the 10-year nationwide ban absurdly broad and an illegal restraint of trade, strikes down the entire clause, and lets you keep your new business."
  },
  {
    title: "Diagram 3 — The Termination & Dismissal Matrix",
    text: "There are no 'layoffs' in non-union common law; there are only three ways a job ends. One: 'Just Cause'. You did something terrible, like stealing, and you are fired instantly with zero severance. Two: 'Without Cause'. The boss just runs out of work. This is perfectly legal, but they must pay you massive severance based on your age and tenure. Three: 'Constructive Dismissal'. The boss slashes your pay or demotes you to make you miserable. You can legally walk out the door and sue them for full severance as if they fired you. Finally, if fired, you have a strict duty to mitigate: you must look for a new job immediately to reduce the boss's financial bleeding.",
    ex: "Your boss suddenly cuts your salary by 20 percent and demotes you from Lead Engineer to Junior Drafter to save money. You do not have to accept this. You can legally walk out, declare Constructive Dismissal, and force your boss to pay you six months of severance pay just as if they had officially fired you."
  },
  {
    title: "Diagram 4 — The Worker Classification Spectrum (The Control Test)",
    text: "You cannot just write 'Independent Contractor' on a piece of paper to save on taxes. The government looks at reality. If the boss tells you exactly how to work, provides your laptop, and pays you a fixed salary, you are an Employee. The boss must pay your taxes and is vicariously liable for your mistakes. If you bring your own tools, juggle multiple clients, and take the risk of losing your own money, you are a true Independent Contractor.",
    ex: "You work at a firm from 9 to 5, using their AutoCAD software, and the boss dictates your daily tasks. To avoid paying benefits, the boss asks you to sign an 'Independent Contractor' agreement. When the CRA audits the firm, they look at the absolute control the boss has over you, declare you an employee, and hit the boss with massive tax penalties."
  },
  {
    title: "Diagram 5 — The Triad of Employee Remedies",
    text: "If you are wrongfully fired, you have three different weapons to fight back. Weapon one: Common Law Court. You pay a lawyer to sue, but you can win massive severance checks, like a year of salary. Weapon two: Employment Standards Branch. It is free because the government fights for you, but the payouts are tiny minimums, and engineers are usually excluded anyway. Weapon three: Human Rights Tribunal. If you were fired for your race, religion, or disability, this cheap tribunal can do something standard courts cannot: they can legally force the boss to give you your exact job back.",
    ex: "You are fired because you need a wheelchair and the private firm refuses to build a ramp. You cannot use the Charter of Rights, because that only restrains the government, not private companies. Instead, you go to the provincial Human Rights Tribunal, which forces the firm to build the ramp, pay you damages, and physically reinstate you at your desk."
  }
];

let currentIndex = 0;
let isPlaying = false;
let isPaused = false;
let utterance = null;

const jumprow = document.getElementById('jumprow');
const scriptBox = document.getElementById('script');
const nowTitle = document.getElementById('now-title');
const nowPlaying = document.getElementById('now-playing');
const progressLine = document.getElementById('progress-line');
const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnStop = document.getElementById('btn-stop');
const rateSelect = document.getElementById('rate-select');

SEGMENTS.forEach((seg, i) => {
  const jb = document.createElement('button');
  jb.className = 'jbtn';
  jb.textContent = i + 1;
  jb.title = seg.title;
  jb.onclick = () => jumpTo(i, true);
  jumprow.appendChild(jb);

  const block = document.createElement('div');
  block.className = 'seg';
  block.id = 'seg-' + i;
  
  block.innerHTML = `
    <span class="seg-num">${i+1}</span>
    <span class="seg-title">${seg.title.replace(/^Diagram \d+ — /,'')}</span>
    <div class="seg-text">${seg.text}</div>
    <div class="ex-text">Example: ${seg.ex}</div>
  `;
  block.onclick = () => jumpTo(i, true);
  scriptBox.appendChild(block);
});

function refreshUI() {
  document.querySelectorAll('.jbtn').forEach((b, i) => {
    b.classList.toggle('active', i === currentIndex && isPlaying);
    b.classList.toggle('done', i < currentIndex);
  });
  document.querySelectorAll('.seg').forEach((s, i) => {
    s.classList.toggle('active', i === currentIndex);
  });
  nowTitle.textContent = SEGMENTS[currentIndex].title;
  nowPlaying.textContent = isPlaying ? (isPaused ? 'Paused' : 'Now playing') : 'Up next';
  progressLine.textContent = `Diagram ${currentIndex + 1} of ${SEGMENTS.length}`;
  btnPlay.disabled = isPlaying && !isPaused;
  btnPause.disabled = !isPlaying || isPaused;
  btnStop.disabled = !isPlaying;
  if (isPlaying) {
    const el = document.getElementById('seg-' + currentIndex);
    if (el) el.scrollIntoView({block: 'nearest', behavior: 'smooth'});
  }
}

function speakCurrent() {
  window.speechSynthesis.cancel();
  
  const fullAudioText = SEGMENTS[currentIndex].text + " " + SEGMENTS[currentIndex].ex;
  
  utterance = new SpeechSynthesisUtterance(fullAudioText);
  utterance.rate = parseFloat(rateSelect.value);
  utterance.onend = () => {
    if (currentIndex < SEGMENTS.length - 1) {
      currentIndex++;
      refreshUI();
      speakCurrent();
    } else {
      isPlaying = false;
      isPaused = false;
      refreshUI();
    }
  };
  isPlaying = true;
  isPaused = false;
  refreshUI();
  window.speechSynthesis.speak(utterance);
}

function jumpTo(i, autoplay) {
  currentIndex = i;
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
  if (autoplay) speakCurrent();
}

btnPlay.onclick = () => {
  if (isPaused) {
    window.speechSynthesis.resume();
    isPaused = false;
    isPlaying = true;
    refreshUI();
  } else {
    speakCurrent();
  }
};
btnPause.onclick = () => {
  window.speechSynthesis.pause();
  isPaused = true;
  refreshUI();
};
btnStop.onclick = () => {
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
};
rateSelect.onchange = () => {
  if (isPlaying) speakCurrent();
};

window.addEventListener('beforeunload', () => window.speechSynthesis.cancel());

refreshUI();
</script>
</body>
</html>
