<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPPE — Chapter 4: Property Law</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
#header{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #e2e5ec;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;}
#header-left{display:flex;align-items:center;gap:14px}
#badge{background:#eff4ff;color:#1d4ed8;font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px;letter-spacing:.05em}
#title{font-size:13px;font-weight:600;color:#1a1d26}
#subtitle{font-size:11px;color:#8b95aa;margin-top:1px}
#controls{display:flex;align-items:center;gap:6px}
.cbtn{background:#fff;border:1px solid #d4d8e2;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:500;color:#5a6070;cursor:pointer;transition:all .12s;font-family:inherit;}
.cbtn:hover{background:#f5f6f8;border-color:#b0b8cc;color:#1a1d26}
#zoom-display{font-size:12px;color:#8b95aa;font-family:'Courier New',monospace;min-width:44px;text-align:center}
#canvas-wrap{position:fixed;top:50px;left:0;right:0;bottom:0;background:#f0f2f5;background-image:radial-gradient(circle,#d4d8e2 1px,transparent 1px);background-size:24px 24px;overflow:hidden;cursor:grab;}
#canvas-wrap.dragging{cursor:grabbing}
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
#node-layer{position:absolute;top:0;left:0;transform-origin:0 0}
.node{position:absolute;transform:translate(-50%,-50%);border-radius:10px;padding:8px 13px;font-size:12px;font-weight:500;line-height:1.4;text-align:center;cursor:pointer;border:1.5px solid transparent;min-width:90px;white-space:pre;transition:transform .15s,box-shadow .15s;}
.node:hover{transform:translate(-50%,-50%) scale(1.07);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.node.root{font-size:14px;font-weight:600;padding:0;border-radius:50%;width:150px;height:150px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;white-space:pre;}
.node.branch{font-size:12px;font-weight:600;padding:10px 15px;}
.node.leaf{font-size:11.5px;padding:7px 11px;}
.node.detail{font-size:11px;padding:6px 10px;}
#tooltip{position:fixed;z-index:200;background:#fff;border:1px solid #d4d8e2;border-radius:10px;padding:12px 15px;font-size:12px;color:#1a1d26;max-width:300px;line-height:1.55;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 4px 20px rgba(0,0,0,.1);}
#tooltip strong{font-size:13px;display:block;margin-bottom:5px;color:#1a1d26}
#tooltip p{font-size:12px;color:#5a6070}
#legend{position:fixed;bottom:16px;left:16px;z-index:100;background:#fff;border:1px solid #e2e5ec;border-radius:10px;padding:12px 14px;}
#legend h4{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#8b95aa;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px;color:#5a6070}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#hint{position:fixed;bottom:16px;right:16px;z-index:100;background:#fff;border:1px solid #e2e5ec;border-radius:8px;padding:8px 12px;font-size:11px;color:#8b95aa;line-height:1.6;}
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <span id="badge">NPPE PREP</span>
    <div>
      <div id="title">Chapter 4 — Property Law</div>
      <div id="subtitle">Engineers Geoscientists Manitoba &nbsp;·&nbsp; Hover nodes for detailed notes</div>
    </div>
  </div>
  <div id="controls">
    <button class="cbtn" id="zout">−</button>
    <span id="zoom-display">100%</span>
    <button class="cbtn" id="zin">+</button>
    <button class="cbtn" id="fit">Fit</button>
    <button class="cbtn" id="r1">1:1</button>
  </div>
</div>

<div id="canvas-wrap">
  <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"><g id="lines"></g></svg>
  <div id="node-layer"></div>
</div>

<div id="tooltip"><strong id="tt-title"></strong><p id="tt-body"></p></div>

<div id="legend">
  <h4>Topic Areas</h4>
  <div class="leg-item"><div class="leg-dot" style="background:#534AB7"></div>Property Types</div>
  <div class="leg-item"><div class="leg-dot" style="background:#185FA5"></div>Real Property</div>
  <div class="leg-item"><div class="leg-dot" style="background:#0F6E56"></div>Specific Rights</div>
  <div class="leg-item"><div class="leg-dot" style="background:#854F0B"></div>Chattels</div>
  <div class="leg-item"><div class="leg-dot" style="background:#993C1D"></div>Copyright</div>
  <div class="leg-item"><div class="leg-dot" style="background:#3B6D11"></div>Patents</div>
  <div class="leg-item"><div class="leg-dot" style="background:#5F5E5A"></div>Trademark & Design</div>
</div>

<div id="hint">🖱 Scroll to zoom &nbsp;·&nbsp; Drag to pan &nbsp;·&nbsp; Hover nodes for notes</div>

<script>
const NODES = [

  // ROOT
  { id:'root', label:'Property\nLaw', type:'root', x:0, y:0,
    color:{bg:'#EEEDFE',border:'#534AB7',text:'#3C3489'},
    tip:'Chapter 4. Property = a bundle of rights. Two main categories: Real Property (land + attachments) and Personal Property (everything else). Personal property = tangible (chattels) + intangible (intellectual property). Property can change form over its life (e.g. nail → fixture → chattel again).' },

  // PROPERTY TYPES
  { id:'proptypes', label:'Property\nCategories', type:'branch', x:-420, y:-200,
    color:{bg:'#EEEDFE',border:'#534AB7',text:'#3C3489'},
    tip:'Two main categories: (1) Real Property — land and anything permanently attached to benefit the land (buildings, fixtures). (2) Personal Property — everything else. Personal property is further split into tangible (chattels/goods) and intangible (IP, licences, royalties).' },
  { id:'fixture', label:'Fixture vs\nChattel', type:'leaf', x:-570, y:-310,
    color:{bg:'#EEEDFE',border:'#7F77DD',text:'#3C3489'},
    tip:'A chattel becomes a fixture (real property) when: (1) attachment is permanent, AND (2) purpose is to benefit the LAND (not the chattel). Example: mobile home bolted to concrete foundation = real property IF intended permanently to benefit the land. A nail pounded into a house becomes real property. If later removed, it becomes a chattel again.' },
  { id:'intangible', label:'Intangible\nProperty', type:'leaf', x:-570, y:-180,
    color:{bg:'#EEEDFE',border:'#7F77DD',text:'#3C3489'},
    tip:'Intellectual property is one form of intangible property. IP = expression of an idea (NOT the idea itself). Forms: copyright (words/data), patent (inventions), trademark (names/logos), industrial design (shape of mass-produced objects), integrated circuits (topography of chips). Ideas alone can only be protected via trade secrets / confidential information.' },

  // REAL PROPERTY
  { id:'realprop', label:'Real Property', type:'branch', x:-180, y:-380,
    color:{bg:'#E6F1FB',border:'#185FA5',text:'#0C447C'},
    tip:'Land and anything permanently attached to land to benefit it. Canadian law derived from English law. Government originally held all rights and transferred some to private parties. Government retains ultimate right — exercised through expropriation (must pay fair compensation). Mines, minerals, oil & gas generally excluded from fee simple.' },
  { id:'feesimple', label:'Fee Simple\n(Freehold)', type:'leaf', x:-340, y:-490,
    color:{bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},
    tip:'Greatest possible private right in land. Owner can sell, lease, occupy, mortgage. Subject to: government planning, environmental law, matrimonial property rights. Two forms of co-ownership: (1) Joint Tenancy — survivor inherits automatically. (2) Tenancy in Common — each holds a stated portion; heirs inherit on death (NOT the co-owner).' },
  { id:'minerals', label:'Mines, Minerals\nOil & Gas', type:'leaf', x:-140, y:-510,
    color:{bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},
    tip:'Generally NOT included in fee simple. Crown (provincial or federal) retains these rights. Governments licence extraction rights for a fee. Subsurface rights holder must obtain a surface lease to access the fee simple holder\'s land for extraction. Certificates of title often include "Mines and Minerals excepted." Sand and gravel vary by province — in many provinces they belong to the fee simple holder.' },
  { id:'boundaries', label:'Property\nBoundaries', type:'leaf', x:20, y:-500,
    color:{bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},
    tip:'Defined by surveys recorded at land registry or land titles offices. Lateral support: neighbours cannot undermine the support of adjacent property by digging — agreements often needed (e.g., rock anchors). Riparian rights: rights to use water on/adjacent to property. Air rights: extend above property to a reasonable level — prevent neighbours from blocking sunlight; used for air space parcels (separate fee simple titles per floor).' },
  { id:'registration', label:'Registration\nSystems', type:'leaf', x:60, y:-380,
    color:{bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},
    tip:'Torrens system (western provinces): government-run certificates of title showing current fee simple holder and all charges. Reliable, up-to-date. Registry system (Ontario/eastern): chronological list only — must review historical records to determine interests. Key rule: FIRST to register has priority. Must register new interests immediately. Unpatented land (e.g. most Aboriginal reserves) cannot be mortgaged or liened.' },

  // SPECIFIC REAL PROPERTY RIGHTS
  { id:'specrights', label:'Specific Real\nProperty Rights', type:'branch', x:260, y:-300,
    color:{bg:'#E1F5EE',border:'#0F6E56',text:'#085041'},
    tip:'Various rights that can exist in real property, many of which "run with the land" — meaning they bind future owners, not just the original parties. Rights that do NOT run with the land are simple contracts between two parties only.' },
  { id:'lease', label:'Lease', type:'leaf', x:160, y:-430,
    color:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},
    tip:'Provides exclusive right to occupy all or part of a property. Generally runs with the land — new purchaser takes subject to the lease. Short-term leases may not be registered but still run with the land depending on province.' },
  { id:'mortgage', label:'Mortgage', type:'leaf', x:300, y:-460,
    color:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},
    tip:'Security for a loan. Gives lender the right to be paid from the property\'s value on sale, in priority to the fee simple holder. Discharged upon repayment. Priority determined by registration order — first registered = first priority.' },
  { id:'easement', label:'Easement &\nRight of Way', type:'leaf', x:430, y:-410,
    color:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},
    tip:'Easement: right to use a neighbour\'s land (usually to cross it). Runs with the land and ties both properties. Can be created by registration OR by repetitive/historical use. Right of Way: an easement specifically for crossing — used for roads, power lines, pipelines, telephone lines.' },
  { id:'covenant', label:'Restrictive\nCovenant', type:'leaf', x:500, y:-290,
    color:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},
    tip:'Conditions imposed on one property for the benefit of a neighbouring property. Negative covenant (refrain from something, e.g. no building) = runs with the land. Positive covenant (do something, e.g. must build) = does NOT run with the land. Broader than easements — can restrict paint colours, building types, etc.' },
  { id:'licence', label:'Licence', type:'leaf', x:490, y:-160,
    color:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},
    tip:'Right to use property that does NOT run with the land. Contract only between fee simple holder and licensee — not binding on future owners. Used for simple access, harvesting trees, wildlife. Compare: Profit à Prendre = combination of easement + licence — DOES run with the land. Used for harvesting trees or removing gravel.' },
  { id:'condo', label:'Condominium\n/ Strata', type:'leaf', x:420, y:-50,
    color:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},
    tip:'Legal structure allowing fee simple ownership of portions of land. Corporation owns bare land, common areas, exterior shell. Individual units get their own fee simple title. Unit owners share ownership of the corporation and pay monthly fees. Corporation can pass bylaws restricting unit use (noise, occupants, leasing restrictions).' },
  { id:'clien', label:'Construction\nLien', type:'leaf', x:300, y:-120,
    color:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},
    tip:'Charge/interest in land from an unpaid builder. Right to register is provided by statute in each province. If registered before a mortgage, the lien holder ranks above the mortgage holder. Cannot be registered against unpatented land (e.g. most Aboriginal reserves). Discussed in detail in Chapter 18.' },

  // CHATTELS
  { id:'chattels', label:'Chattels\n(Personal Property)', type:'branch', x:300, y:130,
    color:{bg:'#FAEEDA',border:'#854F0B',text:'#633806'},
    tip:'Tangible personal property (also called "goods"). Owner can use, lease, rent, or sell. Unlike real property, there is no ownership registry for chattels. Personal Property Registries only record CHARGES/INTERESTS in chattels — not ownership. Search by person/corporation name, not by property.' },
  { id:'ppr', label:'Personal Property\nRegistry', type:'leaf', x:460, y:80,
    color:{bg:'#FAEEDA',border:'#BA7517',text:'#633806'},
    tip:'Records interests/charges in personal property (not ownership itself). Example: when borrowing money to buy a car, the lender registers an interest. First to register = priority. Searches reveal charges granted by a person/corporation, not all their property. Sale of goods governed by provincial sale of goods statutes — implied warranties of fitness, merchantability, and title passing.' },

  // COPYRIGHT
  { id:'copyright', label:'Copyright', type:'branch', x:300, y:290,
    color:{bg:'#FAECE7',border:'#993C1D',text:'#712B13'},
    tip:'Protects expression of ideas in original literary, musical, dramatic, and artistic works. Does NOT protect ideas themselves. Work must be in written, performed, recorded, or communicated form. Computer programs are literary works. Movies/TV are dramatic works.' },
  { id:'copyrequire', label:'Copyright\nRequirements', type:'leaf', x:460, y:220,
    color:{bg:'#FAECE7',border:'#D85A30',text:'#712B13'},
    tip:'Must be: (1) Original and permanent — author\'s own work or skill. (2) Published — copies provided to the public. No registration required. To gain international protection: include © symbol + author name + year (e.g. © DEF Company Ltd. 2005). Copyright register in Ottawa is optional (mainly used for books, scripts, music).' },
  { id:'copyrights', label:'Copyright Rights\n& Moral Rights', type:'leaf', x:490, y:330,
    color:{bg:'#FAECE7',border:'#D85A30',text:'#712B13'},
    tip:'Economic rights: publication, reproduction, performance, exhibition, translation, dissemination. Presumption: original author owns copyright — EXCEPT for commissioned works (engravings, photos, portraits) and work created during employment (employer owns). Moral rights: protect artistic integrity — cannot be assigned but CAN be waived. Include right to prevent distortions, mutilations, and false claims of authorship.' },
  { id:'copyterm', label:'Term: 50 years\nafter author dies', type:'detail', x:430, y:430,
    color:{bg:'#FAECE7',border:'#E8917A',text:'#712B13'},
    tip:'Copyright protection lasts 50 years after the end of the calendar year in which the author (or last surviving author) dies. Plans and specifications: professional generally owns copyright UNLESS specified by contract or created during employment (employer owns). Always address copyright in employment and design contracts.' },

  // PATENTS
  { id:'patents', label:'Patents', type:'branch', x:100, y:390,
    color:{bg:'#EAF3DE',border:'#3B6D11',text:'#27500A'},
    tip:'Protects inventions under the Patent Act. Invention = "any new and useful art, process, machine, manufacture or composition of matter, or any new and useful improvement" thereof. In exchange for exclusive rights, the invention must be sufficiently described to allow others to make it after protection expires.' },
  { id:'patrequire', label:'Patent\nRequirements', type:'leaf', x:220, y:480,
    color:{bg:'#EAF3DE',border:'#639922',text:'#27500A'},
    tip:'Must be: (1) New — not generally known to the public. (2) Useful — commercial application, does what it claims. (3) Inventive. Registration process is stringent, lengthy, and costly (unlike copyright). One-year grace period: if YOU disclose the invention publicly, you have 1 year to file. If a THIRD PARTY discloses it — ability to patent is IMMEDIATELY lost.' },
  { id:'patrights', label:'Patent Rights\n& Ownership', type:'leaf', x:80, y:490,
    color:{bg:'#EAF3DE',border:'#639922',text:'#27500A'},
    tip:'Rights: exclusive right to make, sell, and use the invention. Employer presumed to own inventions developed during employment — may extend to inventions on own time if related to employment. Must address employee IP rights explicitly in employment contracts. Some companies keep patentable inventions as trade secrets instead to avoid disclosure.' },
  { id:'patterm', label:'Term: 20 years\nfrom filing date', type:'detail', x:-60, y:470,
    color:{bg:'#EAF3DE',border:'#7AB84A',text:'#27500A'},
    tip:'Patent protection lasts 20 years from the date the application is filed (not from when the patent is granted). This is why filing date matters — must protect invention from public disclosure until the application is filed.' },

  // TRADEMARK & DESIGN
  { id:'tradedesign', label:'Trademark &\nIndustrial Design', type:'branch', x:-220, y:330,
    color:{bg:'#F1EFE8',border:'#5F5E5A',text:'#444441'},
    tip:'Trademark: protects marks (names, logos, designs) used to distinguish goods/services. Industrial Design: protects the shape, configuration, and look of mass-produced items (furniture, toys, vehicles, household items). Both governed by federal legislation.' },
  { id:'trademark', label:'Trademark', type:'leaf', x:-360, y:'420',
    color:{bg:'#F1EFE8',border:'#888780',text:'#444441'},
    tip:'Must be distinctive. Registered by use or by making it known in Canada, or via international treaties. Multiple trademarks for the same mark are allowed if no likelihood of confusion (different markets). Rights: exclusive use with specific goods/services. Term: 15 years, renewable indefinitely. MUST actively use and defend — failure to use or prosecute infringements = loss of trademark.' },
  { id:'inddesign', label:'Industrial\nDesign', type:'leaf', x:-180, y:440,
    color:{bg:'#F1EFE8',border:'#888780',text:'#444441'},
    tip:'Protects shape, configuration, general look of mass-produced items. Must be novel, original, and NOT purely utilitarian — must have an aesthetic purpose (not just functional). Exclusive right to use the design. Term: 10 years from registration date.' },
  { id:'intcirc', label:'Integrated\nCircuits', type:'leaf', x:-60, y:390,
    color:{bg:'#F1EFE8',border:'#888780',text:'#444441'},
    tip:'Integrated Circuit Topography Act protects design of integrated circuits (layers of semi-conductors, metal, insulators). Key requirement: originality — cannot be a reproduction of another circuit. Rights: exclusive right to reproduce and manufacture the protected topography. Term: 10 years from filing date.' },
  { id:'infringement', label:'Infringement\n& Remedies', type:'leaf', x:-380, y:280,
    color:{bg:'#F1EFE8',border:'#888780',text:'#444441'},
    tip:'Infringement = doing something only the IP owner has the right to do, without consent. Remedies: (1) Injunction — stop further infringement. (2) Order to surrender all infringing copies. (3) Damages — calculated on owner\'s lost profits OR infringer\'s profits earned. Also potentially serious statutory penalties under each IP statute.' },
];

NODES.find(n=>n.id==='trademark').y = 420;

const EDGES = [
  ['root','proptypes'],['root','realprop'],['root','specrights'],['root','chattels'],['root','copyright'],['root','patents'],['root','tradedesign'],
  ['proptypes','fixture'],['proptypes','intangible'],
  ['realprop','feesimple'],['realprop','minerals'],['realprop','boundaries'],['realprop','registration'],
  ['specrights','lease'],['specrights','mortgage'],['specrights','easement'],['specrights','covenant'],['specrights','licence'],['specrights','condo'],['specrights','clien'],
  ['chattels','ppr'],
  ['copyright','copyrequire'],['copyright','copyrights'],['copyright','copyterm'],
  ['patents','patrequire'],['patents','patrights'],['patents','patterm'],
  ['tradedesign','trademark'],['tradedesign','inddesign'],['tradedesign','intcirc'],['tradedesign','infringement'],
];

let scale=1,tx=0,ty=0,dragging=false,lx=0,ly=0;
const wrap=document.getElementById('canvas-wrap');
const nodeLayer=document.getElementById('node-layer');
const linesG=document.getElementById('lines');
const tooltip=document.getElementById('tooltip');
const ttTitle=document.getElementById('tt-title');
const ttBody=document.getElementById('tt-body');
const zoomDisplay=document.getElementById('zoom-display');
const nodeMap={};
NODES.forEach(n=>nodeMap[n.id]=n);

function applyT(){
  nodeLayer.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  zoomDisplay.textContent=Math.round(scale*100)+'%';
  drawEdges();
}

function drawEdges(){
  linesG.innerHTML='';
  linesG.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);
  EDGES.forEach(([a,b])=>{
    const na=nodeMap[a],nb=nodeMap[b];
    if(!na||!nb)return;
    const x1=na.x,y1=na.y,x2=nb.x,y2=nb.y;
    const mx=(x1+x2)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',nb.color.border);
    path.setAttribute('stroke-width',nb.type==='branch'?2:1.5);
    path.setAttribute('opacity','0.45');
    linesG.appendChild(path);
  });
}

function buildNodes(){
  NODES.forEach(n=>{
    const d=document.createElement('div');
    d.className='node '+n.type;
    d.style.left=n.x+'px';
    d.style.top=n.y+'px';
    d.style.background=n.color.bg;
    d.style.borderColor=n.color.border;
    d.style.color=n.color.text;
    d.textContent=n.label;
    d.addEventListener('mouseenter',()=>{
      ttTitle.textContent=n.label.replace(/\n/g,' ');
      ttBody.textContent=n.tip;
      tooltip.style.opacity='1';
    });
    d.addEventListener('mousemove',e=>{
      const x=Math.min(e.clientX+16,window.innerWidth-320);
      const y=Math.min(e.clientY-10,window.innerHeight-170);
      tooltip.style.left=x+'px';
      tooltip.style.top=y+'px';
    });
    d.addEventListener('mouseleave',()=>{tooltip.style.opacity='0';});
    nodeLayer.appendChild(d);
  });
}

function fitView(){
  const xs=NODES.map(n=>n.x),ys=NODES.map(n=>n.y);
  const minX=Math.min(...xs)-110,maxX=Math.max(...xs)+110;
  const minY=Math.min(...ys)-80,maxY=Math.max(...ys)+80;
  const W=window.innerWidth,H=window.innerHeight-50;
  scale=Math.min(W/(maxX-minX),H/(maxY-minY))*0.9;
  tx=W/2-(minX+maxX)/2*scale;
  ty=(H/2+50)-(minY+maxY)/2*scale;
  applyT();
}

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const ox=e.clientX,oy=e.clientY-50;
  const prev=scale;
  scale=Math.min(5,Math.max(0.08,scale*f));
  tx=ox-(ox-tx)*(scale/prev);
  ty=oy-(oy-ty)*(scale/prev);
  applyT();
},{passive:false});

wrap.addEventListener('mousedown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;wrap.classList.add('dragging');});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;applyT();
});
window.addEventListener('mouseup',()=>{dragging=false;wrap.classList.remove('dragging');});

document.getElementById('zin').onclick=()=>{scale=Math.min(5,scale*1.2);applyT();};
document.getElementById('zout').onclick=()=>{scale=Math.max(0.08,scale/1.2);applyT();};
document.getElementById('fit').onclick=fitView;
document.getElementById('r1').onclick=()=>{scale=1;tx=window.innerWidth/2;ty=(window.innerHeight-50)/2;applyT();};

buildNodes();
setTimeout(fitView,100);
</script>
</body>
</html>
