<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPPE — Chapter 1: The Canadian Legal System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}

#header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:#fff;border-bottom:1px solid #e2e5ec;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:50px;
}
#header-left{display:flex;align-items:center;gap:14px}
#badge{background:#eff4ff;color:#1d4ed8;font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px;letter-spacing:.05em}
#title{font-size:13px;font-weight:600;color:#1a1d26}
#subtitle{font-size:11px;color:#8b95aa;margin-top:1px}
#controls{display:flex;align-items:center;gap:6px}
.cbtn{
  background:#fff;border:1px solid #d4d8e2;border-radius:6px;
  padding:5px 11px;font-size:12px;font-weight:500;color:#5a6070;
  cursor:pointer;transition:all .12s;font-family:inherit;
}
.cbtn:hover{background:#f5f6f8;border-color:#b0b8cc;color:#1a1d26}
#zoom-display{font-size:12px;color:#8b95aa;font-family:'Courier New',monospace;min-width:44px;text-align:center}

#canvas-wrap{
  position:fixed;top:50px;left:0;right:0;bottom:0;
  background:#f0f2f5;
  background-image:radial-gradient(circle,#d4d8e2 1px,transparent 1px);
  background-size:24px 24px;
  overflow:hidden;cursor:grab;
}
#canvas-wrap.dragging{cursor:grabbing}
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
#node-layer{position:absolute;top:0;left:0;transform-origin:0 0}

.node{
  position:absolute;transform:translate(-50%,-50%);
  border-radius:10px;padding:8px 13px;
  font-size:12px;font-weight:500;line-height:1.35;
  text-align:center;cursor:pointer;
  border:1.5px solid transparent;
  min-width:90px;white-space:pre;
  transition:transform .15s,box-shadow .15s;
}
.node:hover{transform:translate(-50%,-50%) scale(1.07);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.node.root{
  font-size:14px;font-weight:600;padding:0;
  border-radius:50%;width:144px;height:144px;
  display:flex;align-items:center;justify-content:center;
  text-align:center;line-height:1.3;
}
.node.branch{font-size:12px;font-weight:600;padding:10px 15px;min-width:100px}
.node.leaf{font-size:11.5px;padding:7px 11px;min-width:80px}
.node.detail{font-size:11px;padding:6px 10px;min-width:75px}

#tooltip{
  position:fixed;z-index:200;
  background:#fff;border:1px solid #d4d8e2;
  border-radius:10px;padding:12px 15px;
  font-size:12px;color:#1a1d26;
  max-width:280px;line-height:1.55;
  pointer-events:none;opacity:0;
  transition:opacity .15s;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
#tooltip strong{font-size:13px;display:block;margin-bottom:5px;color:#1a1d26}
#tooltip p{font-size:12px;color:#5a6070}

#legend{
  position:fixed;bottom:16px;left:16px;z-index:100;
  background:#fff;border:1px solid #e2e5ec;border-radius:10px;
  padding:12px 14px;
}
#legend h4{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#8b95aa;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px;color:#5a6070}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

#hint{
  position:fixed;bottom:16px;right:16px;z-index:100;
  background:#fff;border:1px solid #e2e5ec;border-radius:8px;
  padding:8px 12px;font-size:11px;color:#8b95aa;
  line-height:1.6;
}
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <span id="badge">NPPE PREP</span>
    <div>
      <div id="title">Chapter 1 — The Canadian Legal System</div>
      <div id="subtitle">Engineers Geoscientists Manitoba &nbsp;·&nbsp; Hover nodes for detailed notes</div>
    </div>
  </div>
  <div id="controls">
    <button class="cbtn" id="zout">−</button>
    <span id="zoom-display">100%</span>
    <button class="cbtn" id="zin">+</button>
    <button class="cbtn" id="fit">Fit</button>
    <button class="cbtn" id="r1">1:1</button>
  </div>
</div>

<div id="canvas-wrap">
  <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"><g id="lines"></g></svg>
  <div id="node-layer"></div>
</div>

<div id="tooltip"><strong id="tt-title"></strong><p id="tt-body"></p></div>

<div id="legend">
  <h4>Topic Areas</h4>
  <div class="leg-item"><div class="leg-dot" style="background:#534AB7"></div>Constitution</div>
  <div class="leg-item"><div class="leg-dot" style="background:#185FA5"></div>Court System</div>
  <div class="leg-item"><div class="leg-dot" style="background:#0F6E56"></div>Creation of Law</div>
  <div class="leg-item"><div class="leg-dot" style="background:#993C1D"></div>Quebec Civil Law</div>
  <div class="leg-item"><div class="leg-dot" style="background:#3B6D11"></div>Claims & Disputes</div>
  <div class="leg-item"><div class="leg-dot" style="background:#5F5E5A"></div>International Law</div>
</div>

<div id="hint">
  🖱 Scroll to zoom &nbsp;·&nbsp; Drag to pan &nbsp;·&nbsp; Hover nodes for notes
</div>

<script>
const NODES=[
  {id:'root',label:'Canadian\nLegal\nSystem',type:'root',x:0,y:0,color:{bg:'#EEEDFE',border:'#534AB7',text:'#3C3489'},tip:'Chapter 1 overview. Foundation for NPPE. Key themes: jurisdiction, courts, statute vs common law, negligence, contracts, risk allocation.'},

  // Constitution branch
  {id:'const',label:'The Constitution',type:'branch',x:-440,y:-200,color:{bg:'#EEEDFE',border:'#534AB7',text:'#3C3489'},tip:'Source of ALL legal authority in Canada. Made up of British and Canadian parliamentary statutes and conventions. Three primary features: division of powers, courts, and the Charter.'},
  {id:'div',label:'Division of Powers',type:'leaf',x:-600,y:-310,color:{bg:'#EEEDFE',border:'#7F77DD',text:'#3C3489'},tip:'Assigns legislative rights between federal Parliament and provincial legislatures. Federal law prevails wherever there is a direct conflict with provincial law.'},
  {id:'fed',label:'Federal Jurisdiction',type:'detail',x:-760,y:-390,color:{bg:'#EEEDFE',border:'#AFA9EC',text:'#534AB7'},tip:'National defence, postal service, broadcasting, criminal law, patent law. Also: Competition Act (bid rigging, unfair trade practices). Labour law for federal industries (airlines, railways, post office).'},
  {id:'prov',label:'Provincial Jurisdiction',type:'detail',x:-760,y:-280,color:{bg:'#EEEDFE',border:'#AFA9EC',text:'#534AB7'},tip:'Property rights, contracts, negligence, construction liens. Most architecture, engineering, and geoscience laws fall here. Laws differ province to province (e.g. lien legislation differs AB vs ON).'},
  {id:'charter',label:'Charter of Rights\n& Freedoms',type:'leaf',x:-570,y:-140,color:{bg:'#EEEDFE',border:'#7F77DD',text:'#3C3489'},tip:'Part of Constitution. Rights: counsel, no self-incrimination, freedom of religion/speech/association. Non-discrimination on: race, ethnic origin, religion, disability, age. IMPORTANT: applies to government acts only — NOT private party interactions. Human rights statutes cover private interactions.'},

  // Court System branch
  {id:'courts',label:'Court System',type:'branch',x:-180,y:-360,color:{bg:'#E6F1FB',border:'#185FA5',text:'#0C447C'},tip:'Created by the Constitution. Hierarchy of independent courts. No cross-provincial jurisdiction. Federal and provincial systems are separate.'},
  {id:'scc',label:'Supreme Court\nof Canada',type:'leaf',x:-320,y:-490,color:{bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},tip:'Ultimate appellate court. Civil cases require LEAVE to appeal — must show issue of national importance. Rarely grants leave for A/E/G cases. Criminal cases have automatic right of appeal.'},
  {id:'appeal',label:'Provincial Courts\nof Appeal',type:'leaf',x:-130,y:-510,color:{bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},tip:'Each province has its own Court of Appeal. No jurisdiction over courts in other provinces. Federal Court of Appeal is separate for federal matters (patents, shipping).'},
  {id:'superior',label:'Superior Trial Courts',type:'leaf',x:40,y:-460,color:{bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},tip:'Names vary by province: BC Supreme Court, Alta. Court of Queen\'s Bench, Ont./Que. Superior Court. All have "inherent jurisdiction" — can administer justice even without statutory basis. Judges appointed by Governor General, cannot be removed except for misconduct.'},
  {id:'provincial',label:'Provincial Court\n(Small Claims)',type:'leaf',x:60,y:-340,color:{bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},tip:'Lower court. Limited monetary jurisdiction — varies by province. BC small claims max: $25,000. In BC, small claims court has NO jurisdiction over construction liens. Also includes criminal courts and family courts.'},
  {id:'fedcourt',label:'Federal Courts',type:'leaf',x:-310,y:-360,color:{bg:'#E6F1FB',border:'#378ADD',text:'#0C447C'},tip:'Separate from provincial system. Deals with federal matters: patents, shipping disputes. Has its own Federal Court of Appeal. Trial Division and Appeal Division.'},

  // Law Creation branch
  {id:'lawcreation',label:'Creation of Law',type:'branch',x:240,y:-290,color:{bg:'#E1F5EE',border:'#0F6E56',text:'#085041'},tip:'Law is dynamic — changes over time and by jurisdiction. Two main sources: statute law and common law. Law is imprecise and not always predictable.'},
  {id:'statute',label:'Statute Law',type:'leaf',x:390,y:-420,color:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},tip:'Enacted by federal/provincial legislatures. Must comply with Constitution. Relevant statutes: joint & several liability in negligence, construction lien rights, contract formalities, workers compensation. Subordinate legislation = regulations by agencies (engineering associations, municipalities).'},
  {id:'common',label:'Common Law',type:'leaf',x:420,y:-280,color:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},tip:'Judge-made law based on precedent. Roots in English equity — hundreds of years old. All Canadian provinces except Quebec use common law. Judges technically interpret law but in practice create new rights and remedies. Case law is fact-specific — different facts = different result.'},

  // Quebec branch
  {id:'quebec',label:'Quebec\nCivil Law',type:'branch',x:360,y:-110,color:{bg:'#FAECE7',border:'#993C1D',text:'#712B13'},tip:'Quebec uses civil law system based on the Napoleonic Code of France. Private relationships governed by Civil Code of Quebec. A/E/G professionals practising in Quebec must know the Civil Code.'},
  {id:'qvsc',label:'Civil vs\nCommon Law',type:'leaf',x:510,y:-180,color:{bg:'#FAECE7',border:'#D85A30',text:'#712B13'},tip:'Common law: areas may have NO statute — law is judge-made. Civil law (Quebec): all law is codified in statutes. In practice, basic negligence, contract, and insurance principles are fairly consistent across Canada.'},
  {id:'qfed',label:'Federal Law\nStill in Quebec',type:'leaf',x:530,y:-60,color:{bg:'#FAECE7',border:'#D85A30',text:'#712B13'},tip:'Criminal law, patent law, and other federal jurisdiction areas still apply in Quebec under Canadian law framework. Only private relationships default to the Civil Code.'},

  // Claims branch
  {id:'claims',label:'Claims &\nDisputes',type:'branch',x:300,y:130,color:{bg:'#EAF3DE',border:'#3B6D11',text:'#27500A'},tip:'Disputes are common in construction. Many parties involved (owners, A/E/G, contractors, subs, suppliers). Large document volumes. Litigation can exceed the amount in dispute. Key legal areas: negligence and contract law.'},
  {id:'tort',label:'Tort /\nNegligence',type:'leaf',x:460,y:60,color:{bg:'#EAF3DE',border:'#639922',text:'#27500A'},tip:'Involuntary obligations imposed by law. To prove negligence: (1) defendant could reasonably foresee harm to plaintiff, (2) failed to meet standard of care for their position, (3) failure caused the loss. No contract needed between parties.'},
  {id:'contract',label:'Contract Law',type:'leaf',x:480,y:160,color:{bg:'#EAF3DE',border:'#639922',text:'#27500A'},tip:'Voluntary agreements. Key concepts: offer & acceptance, consideration, enforceability. Oral contracts are enforceable (with exceptions). Parties can sue simultaneously for breach of contract AND negligence.'},
  {id:'risk',label:'Risk Allocation',type:'leaf',x:340,y:240,color:{bg:'#EAF3DE',border:'#639922',text:'#27500A'},tip:'Parties shift risk via: contract design, insurance (shift risk to insurer), bonds (non-performance / non-payment protection), contractual disclaimers. Risk allocation is a core theme throughout the book.'},
  {id:'limitation',label:'Limitation Periods\n& Procedures',type:'leaf',x:160,y:250,color:{bg:'#EAF3DE',border:'#639922',text:'#27500A'},tip:'Steps must be taken QUICKLY to preserve legal rights. File a lien, assert a bond claim. Missing deadlines can extinguish rights permanently. Insured must comply with insurance policy requirements. Seek legal advice early.'},

  // International branch
  {id:'intl',label:'International\nLaw',type:'branch',x:-220,y:290,color:{bg:'#F1EFE8',border:'#5F5E5A',text:'#444441'},tip:'Treaties enforceable only if adopted via domestic legislation. Treaties may also help interpret ambiguous domestic legislation. Specialized field — highlights relevant to A/E/G professionals.'},
  {id:'nafta',label:'NAFTA / TN Visa',type:'leaf',x:-370,y:380,color:{bg:'#F1EFE8',border:'#888780',text:'#444441'},tip:'Canadian engineers can get TN visa (inexpensive) to work legally in USA. CRITICAL DISTINCTION: right to work ≠ right to practise. To practise consulting engineering in Oregon, need: (1) TN visa AND (2) Oregon Board of Registration licence.'},
  {id:'tax',label:'Tax Treaties',type:'leaf',x:-180,y:400,color:{bg:'#F1EFE8',border:'#888780',text:'#444441'},tip:'Tax treaties between Canada and many countries prevent double taxation. Canadian income tax may apply even if resident abroad for years. Always consult a tax specialist before working internationally.'},

  // Territories
  {id:'terr',label:'Territories',type:'branch',x:-430,y:120,color:{bg:'#EEEDFE',border:'#534AB7',text:'#3C3489'},tip:'Canada has 3 territories: Yukon, Northwest Territories, Nunavut. Created by federal legislation (unlike self-governing provinces). In practice operate like provinces. References to "provinces" in law include territories. E.g. engineering in Yukon governed by Association of Professional Engineers of Yukon.'},
];

const EDGES=[
  ['root','const'],['root','courts'],['root','lawcreation'],['root','quebec'],['root','claims'],['root','intl'],['root','terr'],
  ['const','div'],['const','charter'],['div','fed'],['div','prov'],
  ['courts','scc'],['courts','appeal'],['courts','superior'],['courts','provincial'],['courts','fedcourt'],
  ['lawcreation','statute'],['lawcreation','common'],
  ['quebec','qvsc'],['quebec','qfed'],
  ['claims','tort'],['claims','contract'],['claims','risk'],['claims','limitation'],
  ['intl','nafta'],['intl','tax'],
];

let scale=1,tx=0,ty=0,dragging=false,lx=0,ly=0;
const wrap=document.getElementById('canvas-wrap');
const nodeLayer=document.getElementById('node-layer');
const linesG=document.getElementById('lines');
const tooltip=document.getElementById('tooltip');
const ttTitle=document.getElementById('tt-title');
const ttBody=document.getElementById('tt-body');
const zoomDisplay=document.getElementById('zoom-display');
const nodeMap={};

NODES.forEach(n=>nodeMap[n.id]=n);

function applyT(){
  nodeLayer.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  zoomDisplay.textContent=Math.round(scale*100)+'%';
  drawEdges();
}

function drawEdges(){
  linesG.innerHTML='';
  // transform the SVG layer to match
  linesG.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);
  EDGES.forEach(([a,b])=>{
    const na=nodeMap[a],nb=nodeMap[b];
    if(!na||!nb)return;
    const x1=na.x,y1=na.y,x2=nb.x,y2=nb.y;
    const mx=(x1+x2)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',nb.color.border);
    path.setAttribute('stroke-width',nb.type==='branch'?2:1.5);
    path.setAttribute('opacity','0.45');
    linesG.appendChild(path);
  });
}

function buildNodes(){
  NODES.forEach(n=>{
    const d=document.createElement('div');
    d.className='node '+n.type;
    d.style.left=n.x+'px';
    d.style.top=n.y+'px';
    d.style.background=n.color.bg;
    d.style.borderColor=n.color.border;
    d.style.color=n.color.text;
    d.textContent=n.label;
    d.addEventListener('mouseenter',e=>{
      ttTitle.textContent=n.label.replace(/\n/g,' ');
      ttBody.textContent=n.tip;
      tooltip.style.opacity='1';
    });
    d.addEventListener('mousemove',e=>{
      const x=Math.min(e.clientX+16,window.innerWidth-300);
      const y=Math.min(e.clientY-10,window.innerHeight-200);
      tooltip.style.left=x+'px';
      tooltip.style.top=y+'px';
    });
    d.addEventListener('mouseleave',()=>{tooltip.style.opacity='0';});
    nodeLayer.appendChild(d);
  });
}

function fitView(){
  const xs=NODES.map(n=>n.x),ys=NODES.map(n=>n.y);
  const minX=Math.min(...xs)-100,maxX=Math.max(...xs)+100;
  const minY=Math.min(...ys)-80,maxY=Math.max(...ys)+80;
  const W=window.innerWidth,H=window.innerHeight-50;
  scale=Math.min(W/(maxX-minX),H/(maxY-minY))*0.9;
  tx=W/2-(minX+maxX)/2*scale;
  ty=(H/2+50)-(minY+maxY)/2*scale;
  applyT();
}

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const ox=e.clientX,oy=e.clientY-50;
  const prev=scale;
  scale=Math.min(5,Math.max(0.08,scale*f));
  tx=ox-(ox-tx)*(scale/prev);
  ty=oy-(oy-ty)*(scale/prev);
  applyT();
},{passive:false});

wrap.addEventListener('mousedown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;wrap.classList.add('dragging');});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;applyT();
});
window.addEventListener('mouseup',()=>{dragging=false;wrap.classList.remove('dragging');});

document.getElementById('zin').onclick=()=>{scale=Math.min(5,scale*1.2);applyT();};
document.getElementById('zout').onclick=()=>{scale=Math.max(0.08,scale/1.2);applyT();};
document.getElementById('fit').onclick=fitView;
document.getElementById('r1').onclick=()=>{scale=1;tx=window.innerWidth/2;ty=(window.innerHeight-50)/2;applyT();};

buildNodes();
setTimeout(fitView,100);
</script>
</body>
</html>
