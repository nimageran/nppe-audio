<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 2 — Audio Explainer (With Applied Examples)</title>
<style>
:root{
  --bg:#F4F6FA; --surface:#FFFFFF; --surface2:#EEF1F8; --border:#DDE2EE; --border2:#C8CEDD;
  --accent:#2056C8; --accent-t:rgba(32,86,200,.08); --text:#1A1F35; --text2:#5B6585; --text3:#9AA0B8;
  --green:#1D9B6A; --radius:9px; --shadow:0 1px 3px rgba(26,31,53,.07), 0 4px 12px rgba(26,31,53,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding:20px;}
.wrap{max-width:760px;margin:0 auto;}
h1{font-size:18px;font-weight:700;margin-bottom:4px;}
.sub{font-size:12px;color:var(--text3);margin-bottom:20px;}

#player{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px;position:sticky;top:16px;z-index:10;}
#now-playing{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
#now-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;min-height:20px;}

.controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.ctrl-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:opacity .12s;}
.ctrl-btn:hover{opacity:.88;}
.ctrl-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.ctrl-btn:disabled{opacity:.35;cursor:default;}
.rate-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-left:auto;}
.rate-wrap select{border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);}

#jumprow{display:flex;flex-wrap:wrap;gap:6px;}
.jbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s;}
.jbtn:hover{background:var(--surface2);}
.jbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.jbtn.done{border-color:var(--green);color:var(--green);}

#progress-line{font-size:11px;color:var(--text3);margin-top:10px;}

#script{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.seg{padding:18px 22px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.seg:last-child{border-bottom:none;}
.seg:hover{background:var(--surface2);}
.seg.active{background:var(--accent-t);border-left:3px solid var(--accent);padding-left:19px;}
.seg-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--text2);margin-right:8px;}
.seg.active .seg-num{background:var(--accent);border-color:var(--accent);color:#fff;}
.seg-title{display:inline;font-size:13.5px;font-weight:600;color:var(--text);}
.seg-text{margin-top:8px;font-size:13.5px;color:var(--text2);line-height:1.65;}
.ex-text{margin-top:8px;font-size:13.5px;color:var(--text);font-weight:600;background:var(--surface2);padding:10px;border-radius:6px;}

.hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;}
</style>
</head>
<body>

<div class="wrap">
  <h1>Chapter 2 — Audio Explainer</h1>
  <div class="sub">Plain-language narration with strict engineering examples. Tap a number to jump straight to it.</div>

  <div id="player">
    <div id="now-playing">Up next</div>
    <div id="now-title">Diagram 1 — The Self-Regulation Bargain</div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-play">▶ Play</button>
      <button class="ctrl-btn secondary" id="btn-pause" disabled>⏸ Pause</button>
      <button class="ctrl-btn secondary" id="btn-stop" disabled>⏹ Stop</button>
      <div class="rate-wrap">
        <span>Speed</span>
        <select id="rate-select">
          <option value="0.8">0.8×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
        </select>
      </div>
    </div>

    <div id="jumprow"></div>
    <div id="progress-line">Diagram 1 of 6</div>
  </div>

  <div id="script"></div>

  <div class="hint">Uses your browser's built-in voice — no audio files, no internet required after the page loads.</div>
</div>

<script>
const SEGMENTS = [
  {
    title: "Diagram 1 — The Self-Regulation Bargain",
    text: "Engineering is a self-regulated profession. This means the government makes a trade with the engineering association. The government gives the association a powerful monopoly, allowing them to control exactly who gets to work and what titles they can use. In exchange, the association promises to use that monopoly to protect the public, not to protect the engineers. The association is not a union; it exists strictly to guard the public from bad engineering, not to get you a raise.",
    ex: "If the government thinks the provincial engineering association is just trying to protect engineers' salaries or cover up bad designs instead of stopping buildings from collapsing, the government will rip up the deal, strip away their monopoly, and regulate the profession themselves."
  },
  {
    title: "Diagram 2 — Right to Title vs Right to Practice",
    text: "The law protects the profession using two completely different shields. Right to Title means only registered members can legally call themselves an 'Engineer.' Right to Practice means only registered members are legally allowed to do the actual physical work of engineering. Engineering and architecture always have both of these protections. Geoscience is tricky; depending on the specific province you are in, they might only have the Right to Title, meaning anyone can do the geology work as long as they don't call themselves a geoscientist.",
    ex: "You graduate with a mechanical engineering degree but haven't passed the licensing board yet. You decide to print 'P.Eng.' on your business card. You are illegally violating the Right to Title, and you will be prosecuted, even if you never actually design a single machine."
  },
  {
    title: "Diagram 3 — The Licensing Gauntlet",
    text: "To get your license, you must survive five strict gates. You need the right academics. You need four years of acceptable experience, usually with at least one year local to Canada. You must prove you speak the language. You must pass a strict test of good character. And finally, you must pass the professional practice and ethics exam, the NPPE. Fail even one of these gates, and you cannot be licensed.",
    ex: "You have a PhD in engineering and ten years of brilliant design experience in Europe. You pass the academics and the exams perfectly. But if you lied on your application form about a past criminal fraud charge, you instantly fail the Good Character gate and will be permanently denied a license."
  },
  {
    title: "Diagram 4 — Discipline vs Enforcement",
    text: "The association uses two totally different weapons depending on who is breaking the rules. 'Discipline' is the weapon used against licensed members who are already inside the tent. If a licensed engineer is negligent, they get disciplined internally. 'Enforcement' is the weapon used against unlicensed outsiders who are trespassing. If a random person off the street tries to design a bridge, the association uses enforcement to drag them into a real public court and stop them.",
    ex: "If you are a licensed P.Eng and you carelessly design a faulty retaining wall, you face Discipline, and the association suspends your license. If your unlicensed neighbor tries to sell retaining wall designs on Facebook, the association uses Enforcement to get a judge to issue an injunction against him."
  },
  {
    title: "Diagram 5 — The Disciplinary Process Pipeline",
    text: "When someone complains about an engineer, it triggers a strict pipeline. First, the association investigates. They gather evidence and decide if the complaint is real or just frivolous. If it is real, it goes to a Disciplinary Hearing. This is not a casual meeting in a boardroom; it is a brutal, formal legal trial where you can cross-examine witnesses and use lawyers. If you lose, they can fine you, suspend you, or strip your license completely.",
    ex: "A client complains that your structural design was dangerously flawed. The investigative committee looks at the math and agrees it looks bad. They send you to a formal hearing. At the hearing, the prosecutor proves your math was completely negligent, and the panel officially revokes your engineering license."
  },
  {
    title: "Diagram 6 — The Three Meanings of the Seal",
    text: "Stamping a drawing with your professional seal is a massive legal guarantee. It means you personally did one of three things: you either prepared the document yourself, you directly supervised the person who prepared it, or you thoroughly reviewed and checked it. The biggest trap is sealing something just out of habit or external pressure without actually doing the required checking. By stamping it, you take 100 percent of the legal liability for every line on that page.",
    ex: "A junior drafter hands you a complex piping diagram at 4:55 PM on a Friday. The client is screaming for it. You quickly stamp your seal on it without actually checking the pressure calculations. The pipe bursts. You are held entirely liable because your seal legally certified that you reviewed it, turning your lazy administrative rubber-stamp into professional negligence."
  }
];

let currentIndex = 0;
let isPlaying = false;
let isPaused = false;
let utterance = null;

const jumprow = document.getElementById('jumprow');
const scriptBox = document.getElementById('script');
const nowTitle = document.getElementById('now-title');
const nowPlaying = document.getElementById('now-playing');
const progressLine = document.getElementById('progress-line');
const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnStop = document.getElementById('btn-stop');
const rateSelect = document.getElementById('rate-select');

SEGMENTS.forEach((seg, i) => {
  const jb = document.createElement('button');
  jb.className = 'jbtn';
  jb.textContent = i + 1;
  jb.title = seg.title;
  jb.onclick = () => jumpTo(i, true);
  jumprow.appendChild(jb);

  const block = document.createElement('div');
  block.className = 'seg';
  block.id = 'seg-' + i;
  
  block.innerHTML = `
    <span class="seg-num">${i+1}</span>
    <span class="seg-title">${seg.title.replace(/^Diagram \d+ — /,'')}</span>
    <div class="seg-text">${seg.text}</div>
    <div class="ex-text">Example: ${seg.ex}</div>
  `;
  block.onclick = () => jumpTo(i, true);
  scriptBox.appendChild(block);
});

function refreshUI() {
  document.querySelectorAll('.jbtn').forEach((b, i) => {
    b.classList.toggle('active', i === currentIndex && isPlaying);
    b.classList.toggle('done', i < currentIndex);
  });
  document.querySelectorAll('.seg').forEach((s, i) => {
    s.classList.toggle('active', i === currentIndex);
  });
  nowTitle.textContent = SEGMENTS[currentIndex].title;
  nowPlaying.textContent = isPlaying ? (isPaused ? 'Paused' : 'Now playing') : 'Up next';
  progressLine.textContent = `Diagram ${currentIndex + 1} of ${SEGMENTS.length}`;
  btnPlay.disabled = isPlaying && !isPaused;
  btnPause.disabled = !isPlaying || isPaused;
  btnStop.disabled = !isPlaying;
  if (isPlaying) {
    const el = document.getElementById('seg-' + currentIndex);
    if (el) el.scrollIntoView({block: 'nearest', behavior: 'smooth'});
  }
}

function speakCurrent() {
  window.speechSynthesis.cancel();
  
  const fullAudioText = SEGMENTS[currentIndex].text + " " + SEGMENTS[currentIndex].ex;
  
  utterance = new SpeechSynthesisUtterance(fullAudioText);
  utterance.rate = parseFloat(rateSelect.value);
  utterance.onend = () => {
    if (currentIndex < SEGMENTS.length - 1) {
      currentIndex++;
      refreshUI();
      speakCurrent();
    } else {
      isPlaying = false;
      isPaused = false;
      refreshUI();
    }
  };
  isPlaying = true;
  isPaused = false;
  refreshUI();
  window.speechSynthesis.speak(utterance);
}

function jumpTo(i, autoplay) {
  currentIndex = i;
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
  if (autoplay) speakCurrent();
}

btnPlay.onclick = () => {
  if (isPaused) {
    window.speechSynthesis.resume();
    isPaused = false;
    isPlaying = true;
    refreshUI();
  } else {
    speakCurrent();
  }
};
btnPause.onclick = () => {
  window.speechSynthesis.pause();
  isPaused = true;
  refreshUI();
};
btnStop.onclick = () => {
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
};
rateSelect.onchange = () => {
  if (isPlaying) speakCurrent();
};

window.addEventListener('beforeunload', () => window.speechSynthesis.cancel());

refreshUI();
</script>
</body>
</html>
