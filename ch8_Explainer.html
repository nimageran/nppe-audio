<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 8 — Audio Explainer (With Applied Examples)</title>
<style>
:root{
  --bg:#F4F6FA; --surface:#FFFFFF; --surface2:#EEF1F8; --border:#DDE2EE; --border2:#C8CEDD;
  --accent:#2056C8; --accent-t:rgba(32,86,200,.08); --text:#1A1F35; --text2:#5B6585; --text3:#9AA0B8;
  --green:#1D9B6A; --radius:9px; --shadow:0 1px 3px rgba(26,31,53,.07), 0 4px 12px rgba(26,31,53,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding:20px;}
.wrap{max-width:760px;margin:0 auto;}
h1{font-size:18px;font-weight:700;margin-bottom:4px;}
.sub{font-size:12px;color:var(--text3);margin-bottom:20px;}

#player{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px;position:sticky;top:16px;z-index:10;}
#now-playing{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
#now-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;min-height:20px;}

.controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.ctrl-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:opacity .12s;}
.ctrl-btn:hover{opacity:.88;}
.ctrl-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.ctrl-btn:disabled{opacity:.35;cursor:default;}
.rate-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-left:auto;}
.rate-wrap select{border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);}

#jumprow{display:flex;flex-wrap:wrap;gap:6px;}
.jbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s;}
.jbtn:hover{background:var(--surface2);}
.jbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.jbtn.done{border-color:var(--green);color:var(--green);}

#progress-line{font-size:11px;color:var(--text3);margin-top:10px;}

#script{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.seg{padding:18px 22px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.seg:last-child{border-bottom:none;}
.seg:hover{background:var(--surface2);}
.seg.active{background:var(--accent-t);border-left:3px solid var(--accent);padding-left:19px;}
.seg-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--text2);margin-right:8px;}
.seg.active .seg-num{background:var(--accent);border-color:var(--accent);color:#fff;}
.seg-title{display:inline;font-size:13.5px;font-weight:600;color:var(--text);}
.seg-text{margin-top:8px;font-size:13.5px;color:var(--text2);line-height:1.65;}
.ex-text{margin-top:8px;font-size:13.5px;color:var(--text);font-weight:600;background:var(--surface2);padding:10px;border-radius:6px;}

.hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;}
</style>
</head>
<body>

<div class="wrap">
  <h1>Chapter 8 — Audio Explainer</h1>
  <div class="sub">Plain-language narration with strict engineering examples. Tap a number to jump straight to it.</div>

  <div id="player">
    <div id="now-playing">Up next</div>
    <div id="now-title">Diagram 1 — The Interpretation Threshold Gate</div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-play">▶ Play</button>
      <button class="ctrl-btn secondary" id="btn-pause" disabled>⏸ Pause</button>
      <button class="ctrl-btn secondary" id="btn-stop" disabled>⏹ Stop</button>
      <div class="rate-wrap">
        <span>Speed</span>
        <select id="rate-select">
          <option value="0.8">0.8×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
        </select>
      </div>
    </div>

    <div id="jumprow"></div>
    <div id="progress-line">Diagram 1 of 7</div>
  </div>

  <div id="script"></div>

  <div class="hint">Uses your browser's built-in voice — no audio files, no internet required after the page loads.</div>
</div>

<script>
const SEGMENTS = [
  {
    title: "Diagram 1 — The Interpretation Threshold Gate",
    text: "Courts do not exist to rewrite bad deals or figure out what is fair. If your contract is perfectly clear, the court applies the exact literal meaning, even if it destroys your company financially. Interpretation only happens if the words are genuinely ambiguous and confusing. And even when interpreting, a judge cannot magically invent new terms that the parties never actually agreed to.",
    ex: "You sign a contract saying you will deliver 'exactly 500 tons of steel by Tuesday.' You deliver 400 tons and ask the judge to be lenient because of a factory delay. The judge refuses to interpret anything. The words are clear, you broke the contract, and you pay the penalty."
  },
  {
    title: "Diagram 2 — Objective vs Subjective Intention",
    text: "The biggest mistake people make in court is arguing about what they privately meant when they signed the contract. The law does not care about your secret, subjective thoughts. The court applies an objective standard: what would a reasonable stranger on the street think these specific words mean? Your private intentions are irrelevant if you didn't write them down clearly.",
    ex: "You write a contract saying 'remove all hazardous soil.' You secretly only meant the top layer of dirt, but you didn't write that down. The objective, reasonable outsider reading that sentence would assume it means all the dirt down to bedrock. You are legally forced to dig to bedrock."
  },
  {
    title: "Diagram 3 — The Canons Working Together",
    text: "When words are ambiguous, judges use a toolkit of principles called 'canons of construction' to figure them out. They look at plain meanings, technical definitions, commercial common sense, and read the contract as a whole. The ultimate weapon of last resort is 'contra proferentem'. This rule punishes whoever drafted the ambiguous clause by interpreting the confusing words in favor of the other guy.",
    ex: "You write a messy, confusing contract for a client saying 'ensure adequate ventilation.' Does that mean one fan or ten? Because you drafted the confusing document, the judge uses the contra proferentem rule against you, and lets the client decide that one cheap fan is perfectly adequate."
  },
  {
    title: "Diagram 4 — The Conflict-Resolution Hierarchy",
    text: "If two pages of the exact same contract totally contradict each other, courts use a strict hierarchy to decide which page wins. Custom, special conditions that you wrote specifically for this exact project will always override pre-printed, generic boilerplate conditions. The law logically assumes your recent, customized words represent your true intent better than a lazy standard form template.",
    ex: "The standard boilerplate CCDC contract says 'contractor pays for weather delays.' But in the customized 'Supplementary Conditions' appendix, you typed 'owner pays for rain delays.' The customized typing completely overrides the boilerplate, so the owner pays."
  },
  {
    title: "Diagram 5 — The Parol Evidence Rule and Its Exceptions",
    text: "The Parol Evidence Rule is a brick wall: if your contract is written and clear, you cannot bring in emails or conversations from before you signed to contradict it. But there are doors through this wall. You can bring in background facts to show the 'factual matrix' of the situation. Or, if the contract is genuinely confusing, the judge will look at your 'subsequent conduct'—how you actually behaved after signing—to figure out what the deal meant.",
    ex: "During negotiations, the owner verbally promises you a $10,000 bonus, but it is left out of the final signed contract. Under the strict Parol Evidence Rule, that verbal promise is dead and inadmissible in court. You get nothing."
  },
  {
    title: "Diagram 6 — Chinook Aggregates: The Privilege Clause",
    text: "Putting a clause in your tender saying 'the lowest bid will not necessarily be accepted' does not give you god-like powers. The Chinook Aggregates case proved that this clause only lets you cancel the project entirely, or reject the lowest bidder for a valid, disclosed reason. It absolutely does not let you pick your friends based on secret, undisclosed criteria.",
    ex: "You use a privilege clause to ignore the $50,000 lowest bid and award the job to your buddy's $60,000 bid because you like him. The lowest bidder sues you. The court rules you breached the contract because 'I like my buddy' was not an official, disclosed evaluation criteria."
  },
  {
    title: "Diagram 7 — The Contract Quality Spectrum",
    text: "Contracts range from perfect to a complete disaster. The best is a deeply negotiated, clear written document. As you move down the spectrum to quick purchase orders, emailed confirmations, and finally purely oral agreements, your risk explodes. Oral contracts force the judge to guess what happened using messy witness testimonies instead of clean, written facts.",
    ex: "You shake hands on a $100,000 piping job at a bar with zero paperwork. A year later, you demand payment, but the client claims you agreed to $50,000. Because it is a purely oral contract, there is no proof. You end up in a brutal, expensive trial where the judge just has to guess who is lying."
  }
];

let currentIndex = 0;
let isPlaying = false;
let isPaused = false;
let utterance = null;

const jumprow = document.getElementById('jumprow');
const scriptBox = document.getElementById('script');
const nowTitle = document.getElementById('now-title');
const nowPlaying = document.getElementById('now-playing');
const progressLine = document.getElementById('progress-line');
const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnStop = document.getElementById('btn-stop');
const rateSelect = document.getElementById('rate-select');

SEGMENTS.forEach((seg, i) => {
  const jb = document.createElement('button');
  jb.className = 'jbtn';
  jb.textContent = i + 1;
  jb.title = seg.title;
  jb.onclick = () => jumpTo(i, true);
  jumprow.appendChild(jb);

  const block = document.createElement('div');
  block.className = 'seg';
  block.id = 'seg-' + i;
  
  block.innerHTML = `
    <span class="seg-num">${i+1}</span>
    <span class="seg-title">${seg.title.replace(/^Diagram \d+ — /,'')}</span>
    <div class="seg-text">${seg.text}</div>
    <div class="ex-text">Example: ${seg.ex}</div>
  `;
  block.onclick = () => jumpTo(i, true);
  scriptBox.appendChild(block);
});

function refreshUI() {
  document.querySelectorAll('.jbtn').forEach((b, i) => {
    b.classList.toggle('active', i === currentIndex && isPlaying);
    b.classList.toggle('done', i < currentIndex);
  });
  document.querySelectorAll('.seg').forEach((s, i) => {
    s.classList.toggle('active', i === currentIndex);
  });
  nowTitle.textContent = SEGMENTS[currentIndex].title;
  nowPlaying.textContent = isPlaying ? (isPaused ? 'Paused' : 'Now playing') : 'Up next';
  progressLine.textContent = `Diagram ${currentIndex + 1} of ${SEGMENTS.length}`;
  btnPlay.disabled = isPlaying && !isPaused;
  btnPause.disabled = !isPlaying || isPaused;
  btnStop.disabled = !isPlaying;
  if (isPlaying) {
    const el = document.getElementById('seg-' + currentIndex);
    if (el) el.scrollIntoView({block: 'nearest', behavior: 'smooth'});
  }
}

function speakCurrent() {
  window.speechSynthesis.cancel();
  
  const fullAudioText = SEGMENTS[currentIndex].text + " " + SEGMENTS[currentIndex].ex;
  
  utterance = new SpeechSynthesisUtterance(fullAudioText);
  utterance.rate = parseFloat(rateSelect.value);
  utterance.onend = () => {
    if (currentIndex < SEGMENTS.length - 1) {
      currentIndex++;
      refreshUI();
      speakCurrent();
    } else {
      isPlaying = false;
      isPaused = false;
      refreshUI();
    }
  };
  isPlaying = true;
  isPaused = false;
  refreshUI();
  window.speechSynthesis.speak(utterance);
}

function jumpTo(i, autoplay) {
  currentIndex = i;
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
  if (autoplay) speakCurrent();
}

btnPlay.onclick = () => {
  if (isPaused) {
    window.speechSynthesis.resume();
    isPaused = false;
    isPlaying = true;
    refreshUI();
  } else {
    speakCurrent();
  }
};
btnPause.onclick = () => {
  window.speechSynthesis.pause();
  isPaused = true;
  refreshUI();
};
btnStop.onclick = () => {
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
};
rateSelect.onchange = () => {
  if (isPlaying) speakCurrent();
};

window.addEventListener('beforeunload', () => window.speechSynthesis.cancel());

refreshUI();
</script>
</body>
</html>
