<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 26 — Audio Explainer (With Applied Examples)</title>
<style>
:root{
  --bg:#F4F6FA; --surface:#FFFFFF; --surface2:#EEF1F8; --border:#DDE2EE; --border2:#C8CEDD;
  --accent:#2056C8; --accent-t:rgba(32,86,200,.08); --text:#1A1F35; --text2:#5B6585; --text3:#9AA0B8;
  --green:#1D9B6A; --radius:9px; --shadow:0 1px 3px rgba(26,31,53,.07), 0 4px 12px rgba(26,31,53,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding:20px;}
.wrap{max-width:760px;margin:0 auto;}
h1{font-size:18px;font-weight:700;margin-bottom:4px;}
.sub{font-size:12px;color:var(--text3);margin-bottom:20px;}

#player{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px;position:sticky;top:16px;z-index:10;}
#now-playing{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
#now-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;min-height:20px;}

.controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.ctrl-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:opacity .12s;}
.ctrl-btn:hover{opacity:.88;}
.ctrl-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.ctrl-btn:disabled{opacity:.35;cursor:default;}
.rate-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-left:auto;}
.rate-wrap select{border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);}

#jumprow{display:flex;flex-wrap:wrap;gap:6px;}
.jbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s;}
.jbtn:hover{background:var(--surface2);}
.jbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.jbtn.done{border-color:var(--green);color:var(--green);}

#progress-line{font-size:11px;color:var(--text3);margin-top:10px;}

#script{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.seg{padding:18px 22px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.seg:last-child{border-bottom:none;}
.seg:hover{background:var(--surface2);}
.seg.active{background:var(--accent-t);border-left:3px solid var(--accent);padding-left:19px;}
.seg-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--text2);margin-right:8px;}
.seg.active .seg-num{background:var(--accent);border-color:var(--accent);color:#fff;}
.seg-title{display:inline;font-size:13.5px;font-weight:600;color:var(--text);}
.seg-text{margin-top:8px;font-size:13.5px;color:var(--text2);line-height:1.65;}
.ex-text{margin-top:8px;font-size:13.5px;color:var(--text);font-weight:600;background:var(--surface2);padding:10px;border-radius:6px;}

.hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;}
</style>
</head>
<body>

<div class="wrap">
  <h1>Chapter 26 — Audio Explainer</h1>
  <div class="sub">Plain-language narration with strict engineering examples. Tap a number to jump straight to it.</div>

  <div id="player">
    <div id="now-playing">Up next</div>
    <div id="now-title">Diagram 1 — The Privacy Law Patchwork</div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-play">▶ Play</button>
      <button class="ctrl-btn secondary" id="btn-pause" disabled>⏸ Pause</button>
      <button class="ctrl-btn secondary" id="btn-stop" disabled>⏹ Stop</button>
      <div class="rate-wrap">
        <span>Speed</span>
        <select id="rate-select">
          <option value="0.8">0.8×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
        </select>
      </div>
    </div>

    <div id="jumprow"></div>
    <div id="progress-line">Diagram 1 of 4</div>
  </div>

  <div id="script"></div>

  <div class="hint">Uses your browser's built-in voice — no audio files, no internet required after the page loads.</div>
</div>

<script>
const SEGMENTS = [
  {
    title: "Diagram 1 — The Privacy Law Patchwork",
    text: "Privacy law in Canada isn't one single rulebook; it is a messy patchwork. If you collect customer data for a commercial business, you automatically fall under the federal PIPEDA law. But if you operate in provinces like BC, Alberta, or Quebec, they have their own strict provincial privacy laws called PIPAs. Because these provincial laws are considered 'substantially similar,' they legally override the federal one. Also, health data and government data have their own totally separate rules. You have to know exactly what kind of data you hold and what province you are in to know which law applies.",
    ex: "You are working in Manitoba managing a customer service database filled with details on industrial case issues. Because Manitoba does not have its own overriding commercial privacy law like Alberta does, your handling of those customer emails and phone numbers falls squarely under the federal PIPEDA rules."
  },
  {
    title: "Diagram 2 — PIPEDA's 10 Fair Information Principles",
    text: "PIPEDA is built on ten strict principles, but the core brutal logic is simple: you cannot just hoover up data because you feel like it. You must identify exactly why you need it, get clear consent from the person, use it only for that specific purpose, and then actively protect it with real security safeguards. You also have to give people access to see their own data if they ask. If you collect data for one reason and secretly use it for something else, you are breaking the law.",
    ex: "You collect phone numbers from machine operators strictly to text them maintenance updates for their CNC machines. A year later, you decide to use those exact same phone numbers to text them marketing ads to buy new drill bits. You just violated PIPEDA, because you used the data for a completely different purpose than what you originally got consent for."
  },
  {
    title: "Diagram 3 — The Data Breach Protocol (PIPEDA)",
    text: "If hackers break into your system, you cannot just quietly fix the server and keep your mouth shut. The law forces a strict breach protocol. The trigger is called the 'Real Risk of Significant Harm', or RROSH. If the stolen data could lead to identity theft, financial loss, or humiliation, you have a massive RROSH. The exact second that happens, you are legally mandated to report the breach to the Privacy Commissioner AND directly notify every single affected person. Covering it up is a massive legal violation.",
    ex: "You run a customer portal for engineering case issues. A hacker steals a list of customer names and their highly confidential corporate billing details. Because this creates a Real Risk of Significant Harm for financial theft, you are legally forced to immediately notify the Privacy Commissioner and email every single customer admitting that you lost their financial data."
  },
  {
    title: "Diagram 4 — CASL (Anti-Spam): The Double Gate",
    text: "The Canadian Anti-Spam Legislation, or CASL, is absolutely ruthless. It makes it illegal to send any Commercial Electronic Message—like a sales email or promotional text—unless it passes two strict gates. First, you must have consent. This can be express, where they explicitly clicked 'yes', or implied, if you already have an active business relationship. Second, the content itself must be compliant. Every single message must clearly identify who you are and contain a perfectly working 'unsubscribe' link. Having consent is not enough; if you forget the unsubscribe link, you fail the second gate and break the law.",
    ex: "You have a list of past clients who bought custom machine parts from you, giving you implied consent to email them. You send out an email blast offering a 20 percent discount on new orders, but you forget to code an 'unsubscribe' button at the bottom of the email. You just violated CASL and can be personally fined thousands of dollars per email."
  }
];

let currentIndex = 0;
let isPlaying = false;
let isPaused = false;
let utterance = null;

const jumprow = document.getElementById('jumprow');
const scriptBox = document.getElementById('script');
const nowTitle = document.getElementById('now-title');
const nowPlaying = document.getElementById('now-playing');
const progressLine = document.getElementById('progress-line');
const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnStop = document.getElementById('btn-stop');
const rateSelect = document.getElementById('rate-select');

SEGMENTS.forEach((seg, i) => {
  const jb = document.createElement('button');
  jb.className = 'jbtn';
  jb.textContent = i + 1;
  jb.title = seg.title;
  jb.onclick = () => jumpTo(i, true);
  jumprow.appendChild(jb);

  const block = document.createElement('div');
  block.className = 'seg';
  block.id = 'seg-' + i;
  
  block.innerHTML = `
    <span class="seg-num">${i+1}</span>
    <span class="seg-title">${seg.title.replace(/^Diagram \d+ — /,'')}</span>
    <div class="seg-text">${seg.text}</div>
    <div class="ex-text">Example: ${seg.ex}</div>
  `;
  block.onclick = () => jumpTo(i, true);
  scriptBox.appendChild(block);
});

function refreshUI() {
  document.querySelectorAll('.jbtn').forEach((b, i) => {
    b.classList.toggle('active', i === currentIndex && isPlaying);
    b.classList.toggle('done', i < currentIndex);
  });
  document.querySelectorAll('.seg').forEach((s, i) => {
    s.classList.toggle('active', i === currentIndex);
  });
  nowTitle.textContent = SEGMENTS[currentIndex].title;
  nowPlaying.textContent = isPlaying ? (isPaused ? 'Paused' : 'Now playing') : 'Up next';
  progressLine.textContent = `Diagram ${currentIndex + 1} of ${SEGMENTS.length}`;
  btnPlay.disabled = isPlaying && !isPaused;
  btnPause.disabled = !isPlaying || isPaused;
  btnStop.disabled = !isPlaying;
  if (isPlaying) {
    const el = document.getElementById('seg-' + currentIndex);
    if (el) el.scrollIntoView({block: 'nearest', behavior: 'smooth'});
  }
}

function speakCurrent() {
  window.speechSynthesis.cancel();
  
  const fullAudioText = SEGMENTS[currentIndex].text + " " + SEGMENTS[currentIndex].ex;
  
  utterance = new SpeechSynthesisUtterance(fullAudioText);
  utterance.rate = parseFloat(rateSelect.value);
  utterance.onend = () => {
    if (currentIndex < SEGMENTS.length - 1) {
      currentIndex++;
      refreshUI();
      speakCurrent();
    } else {
      isPlaying = false;
      isPaused = false;
      refreshUI();
    }
  };
  isPlaying = true;
  isPaused = false;
  refreshUI();
  window.speechSynthesis.speak(utterance);
}

function jumpTo(i, autoplay) {
  currentIndex = i;
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
  if (autoplay) speakCurrent();
}

btnPlay.onclick = () => {
  if (isPaused) {
    window.speechSynthesis.resume();
    isPaused = false;
    isPlaying = true;
    refreshUI();
  } else {
    speakCurrent();
  }
};
btnPause.onclick = () => {
  window.speechSynthesis.pause();
  isPaused = true;
  refreshUI();
};
btnStop.onclick = () => {
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
};
rateSelect.onchange = () => {
  if (isPlaying) speakCurrent();
};

window.addEventListener('beforeunload', () => window.speechSynthesis.cancel());

refreshUI();
</script>
</body>
</html>
