<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 12 — Audio Explainer</title>
<style>
:root{
  --bg:#F4F6FA; --surface:#FFFFFF; --surface2:#EEF1F8; --border:#DDE2EE; --border2:#C8CEDD;
  --accent:#2056C8; --accent-t:rgba(32,86,200,.08); --text:#1A1F35; --text2:#5B6585; --text3:#9AA0B8;
  --green:#1D9B6A; --radius:9px; --shadow:0 1px 3px rgba(26,31,53,.07), 0 4px 12px rgba(26,31,53,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding:20px;}
.wrap{max-width:760px;margin:0 auto;}
h1{font-size:18px;font-weight:700;margin-bottom:4px;}
.sub{font-size:12px;color:var(--text3);margin-bottom:20px;}

#player{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px;position:sticky;top:16px;z-index:10;}
#now-playing{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
#now-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;min-height:20px;}

.controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.ctrl-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:opacity .12s;}
.ctrl-btn:hover{opacity:.88;}
.ctrl-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.ctrl-btn:disabled{opacity:.35;cursor:default;}
.rate-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-left:auto;}
.rate-wrap select{border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);}

#jumprow{display:flex;flex-wrap:wrap;gap:6px;}
.jbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s;}
.jbtn:hover{background:var(--surface2);}
.jbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.jbtn.done{border-color:var(--green);color:var(--green);}

#progress-line{font-size:11px;color:var(--text3);margin-top:10px;}

#script{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.seg{padding:18px 22px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.seg:last-child{border-bottom:none;}
.seg:hover{background:var(--surface2);}
.seg.active{background:var(--accent-t);border-left:3px solid var(--accent);padding-left:19px;}
.seg-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--text2);margin-right:8px;}
.seg.active .seg-num{background:var(--accent);border-color:var(--accent);color:#fff;}
.seg-title{display:inline;font-size:13.5px;font-weight:600;color:var(--text);}
.seg-text{margin-top:8px;font-size:13.5px;color:var(--text2);line-height:1.65;}

.hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;}
</style>
</head>
<body>

<div class="wrap">
  <h1>Chapter 12 — Audio Explainer</h1>
  <div class="sub">Plain-language narration of each diagram. Tap a number to jump straight to it.</div>

  <div id="player">
    <div id="now-playing">Up next</div>
    <div id="now-title">Diagram 1 — The Tort Taxonomy</div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-play">▶ Play</button>
      <button class="ctrl-btn secondary" id="btn-pause" disabled>⏸ Pause</button>
      <button class="ctrl-btn secondary" id="btn-stop" disabled>⏹ Stop</button>
      <div class="rate-wrap">
        <span>Speed</span>
        <select id="rate-select">
          <option value="0.8">0.8×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
        </select>
      </div>
    </div>

    <div id="jumprow"></div>
    <div id="progress-line">Diagram 1 of 11</div>
  </div>

  <div id="script"></div>

  <div class="hint">Uses your browser's built-in voice — no audio files, no internet required after the page loads.</div>
</div>

<script>
const SEGMENTS = [
  {
    title: "Diagram 1 — The Tort Taxonomy",
    text: "A tort is just a civil wrong where someone gets hurt or loses money, without a contract being broken. The whole tort universe splits into two completely different mindsets. On one side, unintentional torts — that's negligence and negligent misrepresentation. You didn't mean to cause harm, but you failed to meet the standard a careful professional should meet. On the other side, intentional torts — fraud, trespass, nuisance, defamation. For these, the court doesn't care how careful you were being. You crossed a hard boundary on purpose, and once the basic elements are proven, you're automatically liable. So before anything else, ask yourself: was this an honest mistake, or a deliberate act? That answer tells you which half of the tort universe you're even working in."
  },
  {
    title: "Diagram 2 — The Negligence Gauntlet",
    text: "This is the core engine of negligence liability, and it's a sequential trap — making a mistake does not automatically mean paying money. A plaintiff has to push your actions through four gates in order, and if any single gate fails, the lawsuit dies right there. Gate one: did you even owe this person a duty of care? Gate two: did you breach that duty — was your work actually sloppy compared to a normal professional? Gate three: did your specific sloppy work directly cause the accident, ignoring other unrelated events — this is the but-for test. Gate four: did real financial or physical damage actually happen? A really useful defense angle is gate four — if the error was caught in time and nobody actually suffered a loss, the claim fails even if everything before it was true."
  },
  {
    title: "Diagram 3 — The Duty of Care Web",
    text: "This is about who can actually sue you, and the relationships are not all the same. With the owner, you have a double connection — they can sue you for breaking the written contract, or sue you separately in tort for negligence, because both routes exist between you. With the public or tenants, there's no contract at all, so tort is their only route — but it's still a real one. The trickiest relationship is with the contractor. Normally you owe them nothing regarding their own construction methods — that's not your lane. But the moment you step outside your role and start giving the workers direct safety instructions, that weak, dotted-line relationship turns solid, and you can suddenly inherit liability for their work too."
  },
  {
    title: "Diagram 4 — The Breach Spectrum: Incompetence versus Lack of Care",
    text: "Once you clear the duty-of-care gate, the next question is whether you breached the standard expected of you, and there are really only two roads into a breach finding. The first is incompetence — working outside your trained field entirely. This is actually rare, because most professionals stay inside their lane. The second, and by far the more common one, is simple lack of care — rushing, skipping a calculation check, not getting a second opinion. The good news is that this common failure mode is also the most preventable one: checklists, peer review, and independent checking all directly target it. And remember, the legal standard is a reasonably competent member of the profession, not perfection — though if you call yourself a specialist, you're held to the specialist's standard, not the average practitioner's."
  },
  {
    title: "Diagram 5 — The Misrepresentation Spectrum",
    text: "A false statement isn't just true or false in the law's eyes — what really matters is the state of mind behind it, and as you move along this spectrum, both the mental state and the available remedy get worse. Innocent misrepresentation means you genuinely had no idea and weren't careless — the only fix here is rescission, basically unwinding the deal, with no damages. Negligent misrepresentation means you should have checked the facts but didn't — now damages become available, and this is actually one of the few situations in all of tort law where pure money loss, with no physical damage, can be recovered. Fraudulent misrepresentation is the worst tier — you knew it was false, or you simply didn't care whether it was true — full damages are available, plus potential criminal exposure. One more thing worth remembering: silence can count as misrepresentation too. An owner who hides a soils report from bidders has misrepresented just as surely as if they'd lied outright."
  },
  {
    title: "Diagram 6 — The Fraud Chain",
    text: "Fraud is the most serious form of misrepresentation, and unlike the spectrum we just covered, it has its own strict four-link chain — every single link has to hold, or the fraud claim collapses entirely, even though a lesser misrepresentation claim might still survive. Link one is about the facts — is the statement actually untrue? Link two is about the mind — did the defendant know it was false, or were they reckless about whether it was true? Link three is about intent — was the false statement specifically meant to get the plaintiff to act? Link four is about result — did the plaintiff actually rely on it, and did that reliance cause real financial harm? All four together is what separates true fraud from the milder negligent misrepresentation we just covered, where the defendant didn't necessarily know they were wrong."
  },
  {
    title: "Diagram 7 — The Fiduciary Trapdoor Test",
    text: "Most client relationships are not fiduciary — they're ordinary commercial relationships governed by normal contract and tort rules. But sometimes a relationship quietly slides into something much more serious, where a breach carries what courts call a stench of dishonesty. Think of this as a trapdoor with three questions stacked on top of each other. First: does one party hold real discretion or power over the other? Second: can that power be used unilaterally, without the other side's input or consent? Third: is the weaker party genuinely vulnerable, truly at the other party's mercy, not just less informed? Only if you answer yes to all three do you fall through into fiduciary territory. Most exam scenarios involving an engineer and their client land safely in the normal, non-fiduciary box — but it's worth checking all three questions before assuming that."
  },
  {
    title: "Diagram 8 — The Nuisance and Strict Liability Bypass",
    text: "Everything in the negligence gauntlet revolves around proving the defendant was careless. Nuisance and trespass completely skip that requirement — there's no duty-of-care box and no breach box anywhere in this chain, and that's the entire point. Instead there are four purely factual questions. Did the defendant make a non-natural use of their land? Did they bring onto the land something likely to cause mischief if it escaped? Did that thing actually escape? And did it cause damage to the plaintiff's property or person? If all four are yes, the defendant is strictly liable — negligence doesn't even enter the picture. For engineering practice, the classic real-world trigger is vibration: pile driving or blasting that escapes onto a neighboring property and causes damage is a textbook strict liability scenario, completely separate from how competently the work was actually performed."
  },
  {
    title: "Diagram 9 — The Pure Economic Loss Gatekeeper",
    text: "This is one of the highest-yield and most counterintuitive concepts in the whole chapter. As a general rule, you cannot sue someone in negligence for pure money loss — meaning a financial loss with no physical injury and no property damage attached to it. Picture this as a wall, with two narrow doors cut into it. Door one is the Hedley Byrne exception: if the loss came from a negligent misrepresentation that was reasonably relied upon, it's recoverable — this connects directly back to the misrepresentation spectrum. Door two is the Winnipeg Condominium exception: if a building defect poses a real, substantial danger to people's health and safety, the cost of fixing it before someone actually gets hurt becomes recoverable, even though at the moment of the lawsuit it's still technically just a financial repair cost. Outside those two doors, courts block the claim because they worry about opening floodgates to unlimited claims from anyone even remotely affected by an error."
  },
  {
    title: "Diagram 10 — The Negligence Shield, or Risk Reduction Cycle",
    text: "If the negligence gauntlet is the attack, this is your armor. Four practices work together here, not as a flat checklist but as a continuous, feeding loop. Checklists and standard procedures catch routine errors before they ever leave your desk. Independent checking of calculations catches the errors checklists miss. Peer review catches systemic or judgment errors that you'd never catch checking your own work twice. And continuing education feeds back into all three, keeping your checklists, your reviewer's knowledge, and your own judgment current. There's a sharp exam point hiding in that last piece: the standard of care is measured at the time you actually did the work, not at the time of trial — so falling behind on current professional standards is itself a form of negligence, even if your work was perfectly fine by yesterday's standards."
  },
  {
    title: "Diagram 11 — The Learned Intermediary Chain",
    text: "In Canada, product liability law forces the consumer to actually prove negligence. But when a product is highly technical, the manufacturer can't realistically explain its dangers directly to an average consumer — and that's exactly where the engineer steps in as what the law calls the learned intermediary. The manufacturer supplies complex equipment along with technical warnings. The engineer, using professional expertise, analyzes that information and then specifies the product for the end consumer, translating raw technical warnings into practical safety limits the consumer can actually follow. Liability tracks whoever broke the chain. If the manufacturer hid a known defect from the engineer, the manufacturer is on the hook. But if the engineer received proper warnings and simply failed to pass the relevant safety information along — or specified the product outside its safe limits — liability shifts to the engineer instead. It comes down to one question: was the product itself defective, which is the manufacturer's problem, or was the specification and translation of the warnings defective, which is the engineer's problem?"
  }
];

let currentIndex = 0;
let isPlaying = false;
let isPaused = false;
let utterance = null;

const jumprow = document.getElementById('jumprow');
const scriptBox = document.getElementById('script');
const nowTitle = document.getElementById('now-title');
const nowPlaying = document.getElementById('now-playing');
const progressLine = document.getElementById('progress-line');
const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnStop = document.getElementById('btn-stop');
const rateSelect = document.getElementById('rate-select');

SEGMENTS.forEach((seg, i) => {
  const jb = document.createElement('button');
  jb.className = 'jbtn';
  jb.textContent = i + 1;
  jb.title = seg.title;
  jb.onclick = () => jumpTo(i, true);
  jumprow.appendChild(jb);

  const block = document.createElement('div');
  block.className = 'seg';
  block.id = 'seg-' + i;
  block.innerHTML = `<span class="seg-num">${i+1}</span><span class="seg-title">${seg.title.replace(/^Diagram \d+ — /,'')}</span><div class="seg-text">${seg.text}</div>`;
  block.onclick = () => jumpTo(i, true);
  scriptBox.appendChild(block);
});

function refreshUI() {
  document.querySelectorAll('.jbtn').forEach((b, i) => {
    b.classList.toggle('active', i === currentIndex && isPlaying);
    b.classList.toggle('done', i < currentIndex);
  });
  document.querySelectorAll('.seg').forEach((s, i) => {
    s.classList.toggle('active', i === currentIndex);
  });
  nowTitle.textContent = SEGMENTS[currentIndex].title;
  nowPlaying.textContent = isPlaying ? (isPaused ? 'Paused' : 'Now playing') : 'Up next';
  progressLine.textContent = `Diagram ${currentIndex + 1} of ${SEGMENTS.length}`;
  btnPlay.disabled = isPlaying && !isPaused;
  btnPause.disabled = !isPlaying || isPaused;
  btnStop.disabled = !isPlaying;
  if (isPlaying) {
    const el = document.getElementById('seg-' + currentIndex);
    if (el) el.scrollIntoView({block: 'nearest', behavior: 'smooth'});
  }
}

function speakCurrent() {
  window.speechSynthesis.cancel();
  utterance = new SpeechSynthesisUtterance(SEGMENTS[currentIndex].text);
  utterance.rate = parseFloat(rateSelect.value);
  utterance.onend = () => {
    if (currentIndex < SEGMENTS.length - 1) {
      currentIndex++;
      refreshUI();
      speakCurrent();
    } else {
      isPlaying = false;
      isPaused = false;
      refreshUI();
    }
  };
  isPlaying = true;
  isPaused = false;
  refreshUI();
  window.speechSynthesis.speak(utterance);
}

function jumpTo(i, autoplay) {
  currentIndex = i;
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
  if (autoplay) speakCurrent();
}

btnPlay.onclick = () => {
  if (isPaused) {
    window.speechSynthesis.resume();
    isPaused = false;
    isPlaying = true;
    refreshUI();
  } else {
    speakCurrent();
  }
};
btnPause.onclick = () => {
  window.speechSynthesis.pause();
  isPaused = true;
  refreshUI();
};
btnStop.onclick = () => {
  window.speechSynthesis.cancel();
  isPlaying = false;
  isPaused = false;
  refreshUI();
};
rateSelect.onchange = () => {
  if (isPlaying) speakCurrent();
};

window.addEventListener('beforeunload', () => window.speechSynthesis.cancel());

refreshUI();
</script>
</body>
</html>
